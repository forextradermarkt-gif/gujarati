    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b0f19;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Card Container */
        .card {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, #0f1626 0%, #080b11 100%);
            border: 2px solid #2a2215;
            border-radius: 40px;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* SEBI Badge */
        .sebi-badge {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #d4af37;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        /* Main Heading */
        .title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Subscribers Badge */
        .subscribers-badge {
            background-color: #0e1624;
            border: 1px solid #1f2a3f;
            border-radius: 50px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            width: 90%;
            justify-content: center;
        }

        .subscribers-badge i {
            color: #229ED9;
            font-size: 20px;
        }

        .sub-count {
            color: #ffffff;
            font-weight: 800;
            font-size: 20px;
            min-width: 85px; /* Layout dynamic loading me shake na ho */
            display: inline-block;
            text-align: right;
        }

        .sub-text {
            color: #a0aec0;
            font-size: 14px;
            font-weight: 500;
        }

        /* Accuracy Card */
        .accuracy-card {
            background: linear-gradient(135deg, rgba(16, 28, 36, 0.9) 0%, rgba(10, 15, 24, 0.9) 100%);
            border-left: 3px solid #00f2fe;
            border-top: 1px solid rgba(0, 242, 254, 0.2);
            border-bottom: 1px solid rgba(0, 242, 254, 0.1);
            border-right: 1px solid rgba(0, 242, 254, 0.1);
            border-radius: 24px;
            padding: 22px 15px;
            width: 100%;
            margin-bottom: 25px;
            box-shadow: inset 0px 0px 15px rgba(0, 242, 254, 0.05);
        }

        .accuracy-title {
            color: #3df2b6;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .accuracy-subtitle {
            color: #3df2b6;
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* Chart Visualizer Area */
        .chart-box {
            background: rgba(10, 15, 24, 0.6);
            border: 1.5px solid #1c1d1a;
            border-radius: 24px;
            width: 100%;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bars-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            height: 90px;
            margin-bottom: 15px;
            width: 100%;
        }

        .bar {
            width: 32px;
            border-radius: 8px;
            background-color: #31d0aa;
            transition: transform 0.3s ease;
        }

        .bar-1 { height: 35%; }
        .bar-2 { height: 65%; }
        .bar-3 { 
            height: 90%; 
            background-color: #f25f5c; /* Red highlight bar */
        }
        .bar-4 { height: 80%; }

        .chart-label {
            color: #718096;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chart-dot {
            width: 6px;
            height: 6px;
            background-color: #31d0aa;
            border-radius: 50%;
        }

        /* Gradient Button with Pulse (Pop-Up) Animation */
        .join-btn {
            background: linear-gradient(90deg, #0072ff 0%, #00f2fe 100%);
            color: #ffcc00; /* Yellow text as in image */
            width: 100%;
            padding: 16px 20px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 30px;
            transition: transform 0.2s ease;
            position: relative;
            
            /* Continuous Pop up / pulse animation */
            animation: pulse-glow 2s infinite ease-in-out;
        }

        /* Hover karne par thoda aur bada ho */
        .join-btn:hover {
            transform: scale(1.05);
            animation-play-state: paused; /* Hover par pulse pause ho jayega */
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.8);
        }

        /* Yellow circular Telegram Icon */
        .join-btn .tg-icon-circle {
            background-color: #ffcc00;
            color: #0072ff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .join-btn .arrow-icon {
            color: #ffcc00;
            font-size: 18px;
        }

        .join-btn span {
            color: #ffcc00;
            letter-spacing: 0.5px;
        }

        /* Pop Up Animation Keyframes */
        @keyframes pulse-glow {
            0% {
                transform: scale(1);
                box-shadow: 0 0 15px rgba(0, 114, 255, 0.4);
            }
            50% {
                transform: scale(1.04); /* Thoda pop up hoga */
                box-shadow: 0 0 25px rgba(0, 242, 254, 0.7); /* Glow badhega */
            }
            100% {

                box-shadow: 0 0 15px rgba(0, 114, 255, 0.4);

    <!-- Live Dynamic Counting JS Code -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const counter = document.getElementById("counter");
            const target = 9880; // Pehle 9880 tak tez speed se jayega
            const duration = 1500; // 1.5 seconds me fast scroll poora hoga
            const startTime = performance.now();
            let currentMembers = 0;

            function updateCounter(currentTime) {
                const elapsedTime = currentTime - startTime;
                const progress = Math.min(elapsedTime / duration, 1);
                
                // Ease-out curve
                const easeOutQuad = progress * (2 - progress); 
                currentMembers = Math.floor(easeOutQuad * target);
                
                counter.innerText = currentMembers.toLocaleString('en-IN') + "+";

                if (progress < 1) {
                    requestAnimationFrame(updateCounter);
                } else {
                    // Fast scroll khatam hote hi live counter background me chalu karega
                    currentMembers = target;
                    counter.innerText = currentMembers.toLocaleString('en-IN') + "+";
                    startLiveGrowth();
                }
            }

            // Live increment loop (Har 1 second me 1 naya member automatic badhta rahega)
            function startLiveGrowth() {
                setInterval(() => {
                    currentMembers += 1;
                    counter.innerText = currentMembers.toLocaleString('en-IN') + "+";
                }, 1000); // 1000ms = 1 Second
            }

            requestAnimationFrame(updateCounter);
        });
    </script>
